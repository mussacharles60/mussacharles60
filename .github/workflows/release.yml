name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
      
        # - name: GitHub Readme Stats Action
        # # You may pin to the exact commit or the version.
        # # uses: stats-organization/github-readme-stats-action@b4d2ef3b8051484b318d455163153b23a2b35fa2
        # uses: stats-organization/github-readme-stats-action@v1.1.0
        # with:
        #   # Card type to generate (stats, top-langs, pin, wakatime, gist).
        #   card: 
        #   # Options for the card (query string or JSON).
        #   options: # optional, default is 
        #   # Output path for SVG file (relative path; include filename with .svg).
        #   path: # optional, default is 
        #   # GitHub token (PAT or GITHUB_TOKEN).
        #   token: # optional, default is 
        
      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v1.1.0
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dark
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v1.1.0
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&langs_count=20&show_icons=true&theme=dark&layout=pie
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card
        uses: stats-organization/github-readme-stats-action@v1.1.0
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=StepperShiftRegister74HC595&theme=dark
          path: profile/pinned-repo.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
      
